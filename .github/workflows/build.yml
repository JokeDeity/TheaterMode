name: Build and Release Windows Executable

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Added dependencies to ensure all imports are covered
        pip install PyQt5 PyQt6 PyQt6-WebEngine pynput pygame pyinstaller pywin32

    - name: Compile with PyInstaller
      run: |
        # Added "--add-data "veil.py;."" to ensure the logic is included in the bundle
        pyinstaller --noconsole --onefile --icon=icon.ico `
        --add-data "icon.ico;." `
        --add-data "veil.py;." `
        --add-data "*.mp3;." `
        --add-data "*.wav;." `
        --add-data "*.gif;." `
        dmod.py

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/dmod.exe
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false