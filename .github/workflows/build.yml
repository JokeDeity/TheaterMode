name: Build Windows Executable

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 pynput pygame pyinstaller pywin32

    - name: Compile with PyInstaller
      run: |
        pyinstaller --noconsole --onefile --icon=icon.ico --add-data "icon.ico;." --add-data "*.mp3;." --add-data "*.wav;." --add-data "*.gif;." dmod.py

    - name: Upload Finished EXE to GitHub Assets
      uses: actions/upload-artifact@v4
      with:
        name: DMod-Windows-Executable
        path: dist/dmod.exe